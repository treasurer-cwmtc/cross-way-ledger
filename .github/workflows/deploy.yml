name: Deploy

# Build once, promote the same image: every push to main builds backend +
# frontend images tagged with the commit SHA, pushes them to Artifact
# Registry, deploys that exact tag to dev automatically, then (pending a
# required reviewer on the "production" GitHub Environment) promotes that
# same untouched image to prod. The frontend's backend URL is set at deploy
# time via the API_BASE Cloud Run env var (see
# frontend/docker/40-env-config.sh) rather than baked in at build time, so
# the identical image genuinely works in both environments.
#
# Auth to GCP uses Workload Identity Federation (keyless - no long-lived
# service account key stored in GitHub). See docs/DEPLOYMENT.md for the
# one-time GCP setup (service account, WIF pool/provider, IAM bindings).

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  ARTIFACT_REGISTRY: us-south1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cross-way-ledger
  BACKEND_REGION: us-south1
  FRONTEND_REGION: us-central1 # us-south1 doesn't yet support custom domain mappings

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-south1-docker.pkg.dev --quiet

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/backend:${{ steps.tag.outputs.tag }}
            ${{ env.ARTIFACT_REGISTRY }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ${{ env.ARTIFACT_REGISTRY }}/frontend:${{ steps.tag.outputs.tag }}
            ${{ env.ARTIFACT_REGISTRY }}/frontend:latest

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.backend.outputs.url }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: backend
        name: Deploy backend to Cloud Run (dev)
        run: |
          gcloud run deploy ledger-backend-dev \
            --image ${{ env.ARTIFACT_REGISTRY }}/backend:${{ needs.build.outputs.image_tag }} \
            --region ${{ env.BACKEND_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --quiet
          url=$(gcloud run services describe ledger-backend-dev --region ${{ env.BACKEND_REGION }} --project ${{ env.GCP_PROJECT_ID }} --format="value(status.url)")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Cloud Run (dev)
        run: |
          gcloud run deploy ledger-frontend-dev \
            --image ${{ env.ARTIFACT_REGISTRY }}/frontend:${{ needs.build.outputs.image_tag }} \
            --region ${{ env.FRONTEND_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --set-env-vars="API_BASE=${{ steps.backend.outputs.url }}" \
            --quiet

  # Promotes the exact same image dev just verified - no rebuild - to prod.
  # Requires a "production" Environment (Settings -> Environments) with a
  # required reviewer configured, so the workflow pauses here until someone
  # approves.
  deploy-prod:
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: backend
        name: Deploy backend to Cloud Run (prod)
        run: |
          gcloud run deploy ledger-backend-prod \
            --image ${{ env.ARTIFACT_REGISTRY }}/backend:${{ needs.build.outputs.image_tag }} \
            --region ${{ env.BACKEND_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --quiet
          url=$(gcloud run services describe ledger-backend-prod --region ${{ env.BACKEND_REGION }} --project ${{ env.GCP_PROJECT_ID }} --format="value(status.url)")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend to Cloud Run (prod)
        run: |
          gcloud run deploy ledger-frontend-prod \
            --image ${{ env.ARTIFACT_REGISTRY }}/frontend:${{ needs.build.outputs.image_tag }} \
            --region ${{ env.FRONTEND_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --set-env-vars="API_BASE=${{ steps.backend.outputs.url }}" \
            --quiet
