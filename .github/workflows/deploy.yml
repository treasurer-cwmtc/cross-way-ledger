name: Deploy

# Build once, promote the same image: every push to main builds backend +
# frontend images tagged with the commit SHA, pushes them to GHCR, deploys
# that exact tag to staging automatically, then deploys that same tag to
# prod - gated behind the "production" GitHub Environment's required
# reviewer approval. See docs/DEPLOYMENT.md for the one-time setup
# (droplets, secrets, environment protection rule, and the one-time
# `docker login ghcr.io` on each droplet that `docker compose pull` below
# depends on, since this repo's GHCR packages are private).

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/treasurer-cwmtc/cross-way-ledger-backend:${{ steps.tag.outputs.tag }}
            ghcr.io/treasurer-cwmtc/cross-way-ledger-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          tags: |
            ghcr.io/treasurer-cwmtc/cross-way-ledger-frontend:${{ steps.tag.outputs.tag }}
            ghcr.io/treasurer-cwmtc/cross-way-ledger-frontend:latest

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ~/cross-way-ledger
            git pull
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f

  # Requires a "production" Environment (Settings -> Environments) with a
  # required reviewer configured - the workflow pauses here until someone
  # approves, so nothing reaches prod without a manual click.
  deploy-prod:
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/cross-way-ledger
            git pull
            export IMAGE_TAG=${{ needs.build.outputs.image_tag }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
