server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service. The upstream is a variable
    # (not a bare hostname) so nginx resolves it lazily per-request via the
    # Docker embedded DNS resolver, rather than failing to start entirely
    # when "backend" doesn't exist on the network (e.g. Cloud Run, where
    # each service is standalone and the frontend instead calls the backend
    # directly via VITE_API_BASE - this location is simply never hit there).
    resolver 127.0.0.11 valid=30s ipv6=off;
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 25m;
    }
}
