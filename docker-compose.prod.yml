# Production/staging overlay: run with
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# - Stops publishing db/backend/frontend ports to the host (they're only
#   reachable over the internal compose network from here on) - only Caddy
#   is exposed publicly, on 80/443.
# - Adds Caddy as a reverse proxy in front of the frontend container, which
#   already proxies /api/* to the backend (see frontend/nginx.conf) - so
#   Caddy only needs one upstream. Caddy handles automatic HTTPS for $DOMAIN.
#
# Requires Docker Compose v2.24+ for the `!reset` merge tag.
services:
  db:
    ports: !reset []

  backend:
    ports: !reset []

  frontend:
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
